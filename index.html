<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PoP2048Agent archives 2048 agent play logs to Filecoin through Synapse SDK." />
    <title>PoP2048Agent</title>
    <link rel="icon" href="assets/pop2048-favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Proof-of-Play</p>
          <h1>PoP2048Agent</h1>
        </div>
        <div class="top-actions" aria-label="App controls">
          <button class="icon-button" id="themeToggle" type="button" aria-label="Toggle color theme" title="Toggle color theme">
            <span aria-hidden="true">◐</span>
          </button>
          <button class="button" id="newGameButton" type="button">New game</button>
        </div>
      </header>

      <section class="game-layout" aria-label="2048 agent game">
        <section class="play-surface" aria-label="2048 board">
          <div class="score-strip" aria-live="polite">
            <div>
              <span>Score</span>
              <strong id="scoreValue">0</strong>
            </div>
            <div>
              <span>Best</span>
              <strong id="bestValue">0</strong>
            </div>
            <div>
              <span>Turns</span>
              <strong id="turnValue">0</strong>
            </div>
          </div>

          <div class="board-wrap">
            <div class="board" id="board" role="grid" aria-label="2048 board"></div>
          </div>

          <div class="move-pad" aria-label="Move controls">
            <span></span>
            <button class="icon-button move-button" type="button" data-move="up" aria-label="Move up" title="Move up">↑</button>
            <span></span>
            <button class="icon-button move-button" type="button" data-move="left" aria-label="Move left" title="Move left">←</button>
            <button class="icon-button move-button primary-move" id="agentMoveButton" type="button" aria-label="Use agent move" title="Use agent move">AI</button>
            <button class="icon-button move-button" type="button" data-move="right" aria-label="Move right" title="Move right">→</button>
            <span></span>
            <button class="icon-button move-button" type="button" data-move="down" aria-label="Move down" title="Move down">↓</button>
            <span></span>
          </div>
        </section>

        <aside class="agent-panel" aria-label="Agent and Filecoin proof panel">
          <section class="panel-block">
            <div class="panel-heading">
              <p class="eyebrow">Agent</p>
              <strong id="agentDirection">-</strong>
            </div>
            <p class="agent-reason" id="agentReason">Start a game to receive an agent move.</p>
            <div class="agent-metrics" id="agentMetrics"></div>
          </section>

          <section class="panel-block">
            <div class="panel-heading">
              <p class="eyebrow">Filecoin</p>
              <strong id="storageMode">Checking</strong>
            </div>
            <p class="status-line" id="storageStatus">Contacting archive service.</p>
            <button class="button full-width" id="archiveButton" type="button">Archive proof</button>
            <div class="receipt" id="receipt" hidden></div>
          </section>

          <section class="panel-block">
            <div class="panel-heading">
              <p class="eyebrow">Retrieve</p>
            </div>
            <label class="cid-field">
              <span>PieceCID</span>
              <input id="pieceCidInput" type="text" autocomplete="off" spellcheck="false" />
            </label>
            <button class="button muted full-width" id="retrieveButton" type="button">Retrieve proof</button>
          </section>

          <section class="panel-block log-block">
            <div class="panel-heading">
              <p class="eyebrow">Session log</p>
              <strong id="digestShort">-</strong>
            </div>
            <ol class="turn-log" id="turnLog"></ol>
          </section>
        </aside>
      </section>
    </main>

    <template id="cellTemplate">
      <div class="cell" role="gridcell"><span></span></div>
    </template>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
